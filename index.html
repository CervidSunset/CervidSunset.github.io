<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Poolrooms Fishing - Iterative Build</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ui-container { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; z-index: 100; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <h1>Poolrooms Fishing</h1>
        <p id="status-text">Booting Engine...</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 0, 15);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 50);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        scene.add(light);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Player Rig ---
        const playerRig = new THREE.Group();
        scene.add(playerRig);
        playerRig.add(camera);

        const controllers = [];
        for (let i = 0; i < 2; i++) {
            const controller = renderer.xr.getController(i);
            controller.addEventListener('selectstart', onSelectStart);
            playerRig.add(controller);
            controllers.push(controller);

            const gripGeo = new THREE.BoxGeometry(0.05, 0.05, 0.1);
            const gripMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
            controller.add(new THREE.Mesh(gripGeo, gripMat));
        }

        // --- Core Variables ---
        const loader = new GLTFLoader();
        loader.setPath('./models/'); 
        const models = {}; 

        let rodModel = null;
        let poolModel = null;
        let activeFish = null; 

        function updateStatus(text) {
            document.getElementById('status-text').innerText = text;
        }

        // --- Safe Loading Helper ---
        // Attempts to load a GLB. If it fails, it returns the provided fallback Mesh.
        async function loadWithFallback(fileName, fallbackMesh) {
            try {
                const gltf = await loader.loadAsync(fileName);
                console.log(`Loaded: ${fileName}`);
                return gltf.scene;
            } catch (error) {
                console.warn(`Missing model: ${fileName}. Using block fallback.`);
                return fallbackMesh;
            }
        }

        // --- Fallback Geometries ---
        // These are only seen if the corresponding .glb file is missing from /models/
        const fbDesk = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 0.6), new THREE.MeshStandardMaterial({color: 0x5c4033}));
        const fbPool = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.MeshStandardMaterial({color: 0x0077be, side: THREE.DoubleSide}));
        fbPool.rotation.x = -Math.PI / 2;
        const fbRod = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.02, 1.5), new THREE.MeshStandardMaterial({color: 0x8b0000}));
        fbRod.geometry.translate(0, 0.75, 0); // Pivot at handle

        const fbTiles = {
            'water': new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 2), new THREE.MeshStandardMaterial({color: 0x0088ff})),
            'dry': new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 2), new THREE.MeshStandardMaterial({color: 0xdddddd})),
            'waterpillar': new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshStandardMaterial({color: 0x004488})),
            'drypillar': new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshStandardMaterial({color: 0x888888})),
            'waterwall': new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshStandardMaterial({color: 0x002244})),
            'drywall': new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshStandardMaterial({color: 0x444444}))
        };

        const fbFish = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.3, 0.05), new THREE.MeshStandardMaterial({color: 0x00ff00}));

        // Asset Arrays
        const tileNames = Object.keys(fbTiles);
        const fishVarieties = [
            { name: "Liminal Koi", file: "liminal_koi.glb" },
            { name: "Tilefish", file: "tilefish.glb" },
            { name: "Backrooms Bass", file: "backrooms_bass.glb" },
            { name: "Glitch Guppy", file: "glitch_guppy.glb" },
            { name: "Chlorine Trout", file: "chlorine_trout.glb" }
        ];

        // --- Asynchronous Init ---
        async function bootGame() {
            updateStatus("Checking models...");

            // 1. Static Environment
            models.desk = await loadWithFallback('desk.glb', fbDesk);
            models.desk.position.set(0, 0.4, -1); // Adjusted fallback Y so it sits on ground
            scene.add(models.desk);

            poolModel = await loadWithFallback('pool.glb', fbPool);
            poolModel.position.set(1.5, 0.01, 0); 
            scene.add(poolModel);

            // 2. Fishing Rod
            rodModel = await loadWithFallback('fishing_rod.glb', fbRod);
            rodModel.position.set(0, 0.85, -1); 
            rodModel.rotation.set(-Math.PI / 2, 0, 0); 
            scene.add(rodModel);

            // 3. WFC Tiles
            for (const tile of tileNames) {
                models[tile] = await loadWithFallback(`${tile}.glb`, fbTiles[tile]);
            }

            // 4. Fish Models
            for (const fish of fishVarieties) {
                // We use clone() on the fallback so all missing fish don't share the same exact object reference
                models[fish.name] = await loadWithFallback(fish.file, fbFish.clone());
            }

            generateWFCMap();
            updateStatus("Explore using joysticks. Pick up the rod to fish.");
        }

        // --- WFC Map Generation ---
        function generateWFCMap() {
            const gridSize = 10;
            const tileSize = 2; 

            for (let x = -gridSize; x <= gridSize; x++) {
                for (let z = -gridSize; z <= gridSize; z++) {
                    if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;

                    const randomTileKey = tileNames[Math.floor(Math.random() * tileNames.length)];
                    const tileToPlace = models[randomTileKey].clone();
                    
                    // Note: If using fallbacks, walls/pillars center point is the middle of the geometry.
                    // This math places the bottom of a 4-unit tall fallback at Y=0.
                    let yPos = 0;
                    if (tileToPlace.geometry && tileToPlace.geometry.parameters.height) {
                        yPos = tileToPlace.geometry.parameters.height / 2;
                    }

                    tileToPlace.position.set(x * tileSize, yPos, z * tileSize);
                    scene.add(tileToPlace);
                }
            }
        }

        // --- Fishing System ---
        let rodHeld = false;
        let fishingState = 'idle'; 
        let fishTimer = null;

        function onSelectStart(event) {
            const controller = event.target;
            
            if (!rodHeld && rodModel) {
                const rodWorldPos = new THREE.Vector3();
                rodModel.getWorldPosition(rodWorldPos);
                
                if (controller.position.distanceTo(rodWorldPos) < 0.4) {
                    controller.add(rodModel);
                    rodModel.position.set(0, 0, -0.1); 
                    rodModel.rotation.set(-Math.PI / 2, 0, 0); 
                    rodHeld = true;
                    updateStatus("Rod equipped! Cast it over the water to the right.");
                }
            } else if (rodHeld && fishingState === 'hooked') {
                const caughtFishData = fishVarieties[Math.floor(Math.random() * fishVarieties.length)];
                updateStatus(`You caught a ${caughtFishData.name}!`);
                
                if (activeFish) rodModel.remove(activeFish);

                activeFish = models[caughtFishData.name].clone();
                activeFish.position.set(0, 1.5, 0); 
                rodModel.add(activeFish);

                fishingState = 'idle';
            }
        }

        function handleFishingLogic() {
            if (!rodHeld || !rodModel || !poolModel) return;

            const rodTipLocal = new THREE.Vector3(0, 1.5, 0); 
            const rodTipWorld = rodModel.localToWorld(rodTipLocal.clone());

            const poolPos = new THREE.Vector3();
            poolModel.getWorldPosition(poolPos);
            
            const dx = rodTipWorld.x - poolPos.x;
            const dz = rodTipWorld.z - poolPos.z;
            const distanceToPoolCenter = Math.sqrt(dx * dx + dz * dz);
            
            const overPool = distanceToPoolCenter < 1.0;

            if (overPool && rodTipWorld.y < 0.8 && fishingState === 'idle') {
                fishingState = 'fishing';
                updateStatus("Waiting for a bite...");
                
                if (activeFish) {
                    rodModel.remove(activeFish);
                    activeFish = null;
                }
                
                const waitTime = Math.random() * 5000 + 3000;
                clearTimeout(fishTimer);
                fishTimer = setTimeout(() => {
                    if (fishingState === 'fishing') {
                        fishingState = 'hooked';
                        updateStatus("FISH ON! Press the trigger to reel it in!");
                    }
                }, waitTime);
            } else if (!overPool && fishingState === 'fishing') {
                fishingState = 'idle';
                clearTimeout(fishTimer);
                updateStatus("You pulled the rod out of the water.");
            }
        }

        // --- Locomotion Logic ---
        function handleLocomotion() {
            const session = renderer.xr.getSession();
            if (!session) return;

            for (const source of session.inputSources) {
                if (source.gamepad) {
                    if (source.handedness === 'left' && source.gamepad.axes.length >= 4) {
                        const axisX = source.gamepad.axes[2]; 
                        const axisZ = source.gamepad.axes[3]; 
                        
                        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                        forward.y = 0; 
                        forward.normalize();
                        
                        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                        right.y = 0;
                        right.normalize();

                        if (Math.abs(axisZ) > 0.1) playerRig.position.add(forward.multiplyScalar(-axisZ * 0.05));
                        if (Math.abs(axisX) > 0.1) playerRig.position.add(right.multiplyScalar(axisX * 0.05));
                    }
                    
                    if (source.handedness === 'right' && source.gamepad.axes.length >= 4) {
                        const axisX = source.gamepad.axes[2];
                        if (!source.gamepad.turnFired && Math.abs(axisX) > 0.5) {
                            playerRig.rotation.y -= Math.sign(axisX) * (Math.PI / 4); 
                            source.gamepad.turnFired = true; 
                        } else if (Math.abs(axisX) < 0.1) {
                            source.gamepad.turnFired = false;
                        }
                    }
                }
            }
        }

        // --- Run Engine ---
        bootGame();

        renderer.setAnimationLoop(() => {
            handleLocomotion();
            handleFishingLogic();
            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
