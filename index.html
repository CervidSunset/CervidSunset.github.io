<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Poolrooms Fishing</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ui-container { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; z-index: 100; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <h1>Poolrooms Fishing</h1>
        <p id="status-text">Loading 3D Models... Please wait.</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 0, 15);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 50);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        scene.add(light);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Player Rig ---
        const playerRig = new THREE.Group();
        scene.add(playerRig);
        playerRig.add(camera);

        const controllers = [];
        for (let i = 0; i < 2; i++) {
            const controller = renderer.xr.getController(i);
            controller.addEventListener('selectstart', onSelectStart);
            playerRig.add(controller);
            controllers.push(controller);

            const gripGeo = new THREE.BoxGeometry(0.05, 0.05, 0.1);
            const gripMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
            controller.add(new THREE.Mesh(gripGeo, gripMat));
        }

        // --- Model Caching & Asset Arrays ---
        const loader = new GLTFLoader();
        
        // This is the key change: tells the loader to look in the 'models' folder for all subsequent files
        loader.setPath('./models/'); 
        
        const models = {}; 

        const tileNames = ['water', 'dry', 'waterpillar', 'drypillar', 'waterwall', 'drywall'];
        const fishVarieties = [
            { name: "Liminal Koi", file: "liminal_koi" },
            { name: "Tilefish", file: "tilefish" },
            { name: "Backrooms Bass", file: "backrooms_bass" },
            { name: "Glitch Guppy", file: "glitch_guppy" },
            { name: "Chlorine Trout", file: "chlorine_trout" }
        ];

        let rodModel = null;
        let poolModel = null;
        let activeFish = null; 

        function updateStatus(text) {
            document.getElementById('status-text').innerText = text;
        }

        // --- Asynchronous Loading ---
        async function loadAssetsAndInit() {
            try {
                // 1. Load Static Environment
                const deskGltf = await loader.loadAsync('desk.glb');
                models.desk = deskGltf.scene;
                models.desk.position.set(0, 0, -1); 
                scene.add(models.desk);

                const poolGltf = await loader.loadAsync('pool.glb');
                poolModel = poolGltf.scene;
                poolModel.position.set(1.5, 0, 0); 
                scene.add(poolModel);

                // 2. Load Fishing Rod
                const rodGltf = await loader.loadAsync('fishing_rod.glb');
                rodModel = rodGltf.scene;
                rodModel.position.set(0, 0.85, -1); 
                scene.add(rodModel);

                // 3. Load WFC Tiles
                for (const tile of tileNames) {
                    const gltf = await loader.loadAsync(`${tile}.glb`);
                    models[tile] = gltf.scene;
                }

                // 4. Load Fish Models
                for (const fish of fishVarieties) {
                    const gltf = await loader.loadAsync(`${fish.file}.glb`);
                    models[fish.name] = gltf.scene;
                }

                // Build Map and start logic
                generateWFCMap();
                updateStatus("Explore using joysticks. Pick up the rod to fish.");
                console.log("All models loaded successfully from the /models/ directory.");
                
            } catch (error) {
                console.error("CRITICAL ERROR: Failed to load a 3D model.", error);
                updateStatus("Error loading models. Check the browser console (F12) to see which file failed.");
            }
        }

        // --- WFC Map Generation (GLTF Instancing) ---
        function generateWFCMap() {
            const gridSize = 10;
            const tileSize = 2; 

            for (let x = -gridSize; x <= gridSize; x++) {
                for (let z = -gridSize; z <= gridSize; z++) {
                    if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;

                    const randomTileKey = tileNames[Math.floor(Math.random() * tileNames.length)];
                    const tileToPlace = models[randomTileKey].clone();
                    
                    tileToPlace.position.set(x * tileSize, 0, z * tileSize);
                    scene.add(tileToPlace);
                }
            }
        }

        // --- Fishing System ---
        let rodHeld = false;
        let fishingState = 'idle'; 
        let fishTimer = null;

        function onSelectStart(event) {
            const controller = event.target;
            
            if (!rodHeld && rodModel) {
                const rodWorldPos = new THREE.Vector3();
                rodModel.getWorldPosition(rodWorldPos);
                
                if (controller.position.distanceTo(rodWorldPos) < 0.4) {
                    controller.add(rodModel);
                    rodModel.position.set(0, 0, -0.1); 
                    rodModel.rotation.set(-Math.PI / 4, 0, 0); 
                    rodHeld = true;
                    updateStatus("Rod equipped! Cast it over the water to the right.");
                }
            } else if (rodHeld && fishingState === 'hooked') {
                const caughtFishData = fishVarieties[Math.floor(Math.random() * fishVarieties.length)];
                updateStatus(`You caught a ${caughtFishData.name}!`);
                
                if (activeFish) {
                    rodModel.remove(activeFish);
                }

                activeFish = models[caughtFishData.name].clone();
                activeFish.position.set(0, 1.5, 0); 
                rodModel.add(activeFish);

                fishingState = 'idle';
                console.log("Water normalized.");
            }
        }

        function handleFishingLogic() {
            if (!rodHeld || !rodModel || !poolModel) return;

            const rodTipLocal = new THREE.Vector3(0, 1.5, 0); 
            const rodTipWorld = rodModel.localToWorld(rodTipLocal.clone());

            const poolPos = new THREE.Vector3();
            poolModel.getWorldPosition(poolPos);
            
            const dx = rodTipWorld.x - poolPos.x;
            const dz = rodTipWorld.z - poolPos.z;
            const distanceToPoolCenter = Math.sqrt(dx * dx + dz * dz);
            
            const overPool = distanceToPoolCenter < 1.0;

            if (overPool && rodTipWorld.y < 0.8 && fishingState === 'idle') {
                fishingState = 'fishing';
                updateStatus("Waiting for a bite...");
                
                if (activeFish) {
                    rodModel.remove(activeFish);
                    activeFish = null;
                }
                
                const waitTime = Math.random() * 5000 + 3000;
                clearTimeout(fishTimer);
                fishTimer = setTimeout(() => {
                    if (fishingState === 'fishing') {
                        fishingState = 'hooked';
                        updateStatus("FISH ON! Press the trigger to reel it in!");
                    }
                }, waitTime);
            } else if (!overPool && fishingState === 'fishing') {
                fishingState = 'idle';
                clearTimeout(fishTimer);
                updateStatus("You pulled the rod out of the water.");
            }
        }

        // --- Locomotion Logic ---
        function handleLocomotion() {
            const session = renderer.xr.getSession();
            if (!session) return;

            for (const source of session.inputSources) {
                if (source.gamepad) {
                    if (source.handedness === 'left' && source.gamepad.axes.length >= 4) {
                        const axisX = source.gamepad.axes[2]; 
                        const axisZ = source.gamepad.axes[3]; 
                        
                        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                        forward.y = 0; 
                        forward.normalize();
                        
                        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                        right.y = 0;
                        right.normalize();

                        if (Math.abs(axisZ) > 0.1) playerRig.position.add(forward.multiplyScalar(-axisZ * 0.05));
                        if (Math.abs(axisX) > 0.1) playerRig.position.add(right.multiplyScalar(axisX * 0.05));
                    }
                    
                    if (source.handedness === 'right' && source.gamepad.axes.length >= 4) {
                        const axisX = source.gamepad.axes[2];
                        if (!source.gamepad.turnFired && Math.abs(axisX) > 0.5) {
                            playerRig.rotation.y -= Math.sign(axisX) * (Math.PI / 4); 
                            source.gamepad.turnFired = true; 
                        } else if (Math.abs(axisX) < 0.1) {
                            source.gamepad.turnFired = false;
                        }
                    }
                }
            }
        }

        // --- Boot Application ---
        loadAssetsAndInit();

        // --- Main Render Loop ---
        renderer.setAnimationLoop(() => {
            handleLocomotion();
            handleFishingLogic();
            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
